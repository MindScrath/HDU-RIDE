apiVersion: apps/v1
kind: Deployment
metadata:
  name: hdu-ride-backend
  namespace: hdu-ride
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: hdu-ride-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hdu-ride-backend
    spec:
      serviceAccountName: hdu-ride-backend
      containers:
        - name: backend
          image: registry.example.edu/hdu-ride/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: hdu-ride-backend-env
          volumeMounts:
            - name: content
              mountPath: /content
      volumes:
        - name: content
          persistentVolumeClaim:
            claimName: hdu-ride-content
---
apiVersion: v1
kind: Service
metadata:
  name: hdu-ride-backend
  namespace: hdu-ride
spec:
  selector:
    app.kubernetes.io/name: hdu-ride-backend
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hdu-ride-backend
  namespace: hdu-ride
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hdu-ride-workspaces
  namespace: hdu-ride
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "persistentvolumeclaims"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hdu-ride-workspaces
  namespace: hdu-ride
subjects:
  - kind: ServiceAccount
    name: hdu-ride-backend
roleRef:
  kind: Role
  name: hdu-ride-workspaces
  apiGroup: rbac.authorization.k8s.io
