apiVersion: v1
kind: PersistentVolume
metadata:
  name: hdu-ride-content-pv
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  hostPath:
    path: /opt/hdu-ride/content
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hdu-ride-content
  namespace: hdu-ride
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi
  volumeName: hdu-ride-content-pv
