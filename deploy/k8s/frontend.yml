apiVersion: apps/v1
kind: Deployment
metadata:
  name: hdu-ride-frontend
  namespace: hdu-ride
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hdu-ride-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hdu-ride-frontend
    spec:
      containers:
        - name: frontend
          image: hdu-ride-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: BAILIAN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hdu-ride-backend-env
                  key: BAILIAN_API_KEY
            - name: BAILIAN_APP_ID
              valueFrom:
                secretKeyRef:
                  name: hdu-ride-backend-env
                  key: BAILIAN_APP_ID
---
apiVersion: v1
kind: Service
metadata:
  name: hdu-ride-frontend
  namespace: hdu-ride
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: hdu-ride-frontend
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30080
